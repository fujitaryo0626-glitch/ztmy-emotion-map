  return "<div class=\"bar\">"+b+"</div>";
}

// Event delegation - no inline onclick needed
document.addEventListener("click",function(ev){
  var t=ev.target.closest("[data-action]");
  if(!t)return;
  var a=t.getAttribute("data-action");
  var v=t.getAttribute("data-val");
  if(a==="pick"){sel=v==="null"?null:S[parseInt(v)].name;showPh=false;secF=null;render();}
  else if(a==="emo"){emoF=(v==="null"||emoF===v)?null:v;render();}
  else if(a==="drill"){showPh=!showPh;render();}
  else if(a==="sec"){secF=v==="null"?null:v;render();}
  else if(a==="sim"){
    for(var i=0;i<S.length;i++){if(S[i].name===v){sel=S[i].name;showPh=false;secF=null;render();break;}}
  }
});

function render(){
  var songs=[];
  for(var i=0;i<S.length;i++){
    var s=S[i];
    var ok=true;
    var phHits=0;
    if(txtF){var nameHit=s.name.indexOf(txtF)>=0;if(!nameHit){for(var j=0;j<P.length;j++){if(P[j].song===s.name&&P[j].ph.indexOf(txtF)>=0)phHits++;}}if(!nameHit&&phHits===0)ok=false;}
    if(emoF&&s.t1!==emoF&&s.t2!==emoF&&s.t3!==emoF)ok=false;
    if(ok)songs.push({s:s,i:i,phHits:phHits});
  }
  var ss=null,sh=null,ssIdx=-1;
  if(sel){
    for(var i=0;i<S.length;i++){if(S[i].name===sel){ss=S[i];ssIdx=i;break;}}
    for(var i=0;i<H.length;i++){if(H[i].n===sel){sh=H[i];break;}}
  }

  var o="<div class=\"hdr\"><h1>ずとまよ 感情地図</h1><p>"+TOTAL_SONGS+"曲 \u00d7 "+TOTAL_PHRASES+"フレーズの感情分析</p></div>";
  o+="<div class=\"chips\"><div class=\"chip "+(!emoF?"on":"")+"\" data-action=\"emo\" data-val=\"null\">ALL</div>";
  for(var i=0;i<EO.length;i++){
    var e=EO[i];
    o+="<div class=\"chip "+(emoF===e?"on":"")+"\" style=\"--c:"+EC[e]+"22;--ct:"+EC[e]+";--cb:"+EC[e]+"66\" data-action=\"emo\" data-val=\""+e+"\"><span class=\"dot\" style=\"background:"+EC[e]+"\"></span>"+e+"</div>";
  }
  o+="</div>";
  o+="<div class=\"search\"><input id=\"sinp\" type=\"text\" placeholder=\"曲名・歌詞を検索…\" value=\""+he(txtF)+"\"></div>";
  o+="<div class=\"grid\">";
  for(var si=0;si<songs.length;si++){
    var s=songs[si].s,idx=songs[si].i;
    var h=null;
    for(var j=0;j<H.length;j++){if(H[j].n===s.name){h=H[j];break;}}
    var isSel=sel===s.name;
    var c=EC[s.t1]||"#888";
    o+="<div class=\"card "+(isSel?"sel":"")+"\" style=\""+(isSel?"background:linear-gradient(135deg,"+c+"15,"+c+"25);--bc:"+c+"44":"")+"\" data-action=\"pick\" data-val=\""+idx+"\">";
    o+="<div class=\"top\"><span class=\"nm\">"+he(s.name)+"</span>"+pill(s.t1)+"</div>";
    if(h)o+=bar(h);
    o+="<div class=\"desc\">"+he(s.sum)+"</div>"+(songs[si].phHits>0?"<div style=\"font-size:10px;color:#9B5DE5;margin-top:4px\">\u266a \u6b4c\u8a5e\u306b"+songs[si].phHits+"\u4ef6\u30d2\u30c3\u30c8</div>":"")+"</div>";
  }
  o+="</div>";
  if(!songs.length)o+="<div class=\"empty\">一致する曲がありません</div>";

  if(ss){
    var c=EC[ss.t1]||"#888";
    var phs=[];
    for(var i=0;i<P.length;i++){if(P[i].song===sel){if(!secF||(P[i].sec&&P[i].sec.indexOf(secF)>=0))phs.push(P[i]);}}

    o+="<div class=\"detail anim\" id=\"dtl\"><div class=\"dpanel\" style=\"border:1px solid "+c+"33\">";
    o+="<div class=\"dp-hdr\" style=\"background:linear-gradient(135deg,"+c+"12,transparent)\">";
    o+="<div style=\"display:flex;justify-content:space-between;align-items:start\"><div><h2>"+he(ss.name)+"</h2><div class=\"sub\">"+(PC[ss.name]||ss.pc||0)+" フレーズ分析</div></div>";
    o+="<button class=\"close-btn\" data-action=\"pick\" data-val=\"null\">\u2715 閉じる</button></div>";
    o+="<div class=\"dp-box\"><p>"+he(ss.sum)+"</p></div>";
    o+="<div class=\"tops\">";
    var t3=[ss.t1,ss.t2,ss.t3];
    for(var i=0;i<t3.length;i++){if(t3[i])o+="<div style=\"display:flex;align-items:center;gap:4px\"><span class=\"rank\">#"+(i+1)+"</span>"+pill(t3[i],"pill-md")+"</div>";}
    o+="</div>";
    o+="<div style=\"margin-top:10px\"><span style=\"font-size:11px;color:#6666aa\">細感情: </span><span style=\"font-size:11px;color:#9999bb\">"+he(ss.sub)+"</span></div></div>";

    o+="<div class=\"dp-sec\"><div class=\"label\">感情フロー</div><div class=\"flow\">";
    var fl=[];
    if(ss.vA)fl.push(["Aメロ",ss.vA]);
    if(ss.vB)fl.push(["Bメロ",ss.vB]);
    if(ss.ch)fl.push(["サビ",ss.ch]);
    if(ss.end)fl.push(["ラスト",ss.end]);
    for(var i=0;i<fl.length;i++){
      var fc=EC[fl[i][1]]||"#888";
      o+="<div class=\"flow-item\"><span class=\"fl\">"+fl[i][0]+"</span><div class=\"fb\" style=\"background:"+fc+"33;color:"+fc+";border:2px solid "+fc+"66\">"+fl[i][1].slice(0,2)+"</div></div>";
      if(i<fl.length-1)o+="<span class=\"flow-arrow\">\u2192</span>";
    }
    o+="</div></div>";

    o+="<div class=\"dp-sec\"><div class=\"label\">感情分布</div>";
    if(sh)o+=bar(sh);
    o+="<div class=\"dist-grid\">";
    if(sh){for(var i=0;i<EO.length;i++){var e=EO[i];var v=sh[e]||0;if(v){var pct=Math.round(v/sh.t*100);o+="<div class=\"dist-cell\" style=\"background:"+EC[e]+"11\"><span class=\"dv\" style=\"color:"+EC[e]+"\">"+v+"</span><span class=\"dn\" style=\"color:"+EC[e]+"aa\">"+e+"</span><span class=\"dp\">"+pct+"%</span></div>";}}}
    o+="</div></div>";

    o+="<div class=\"dp-sec\"><div class=\"label\">類似曲</div><div class=\"sim-btns\">";
    var sims=[ss.s1,ss.s2,ss.s3];
    for(var i=0;i<sims.length;i++){if(sims[i])o+="<div class=\"sim-btn\" data-action=\"sim\" data-val=\""+he(sims[i])+"\">\u2192 "+he(sims[i])+"</div>";}
    o+="</div></div>";

    o+="<div class=\"dp-sec\"><div class=\"drill-btn "+(showPh?"on":"")+"\" style=\""+(showPh?"--dc:"+c+";background:"+c+"22;border-color:"+c+"44":"")+"\" data-action=\"drill\">"+(showPh?"\u25b2 フレーズ分析を閉じる":"\u25bc フレーズ別に深掘りする")+"</div></div>";

    if(showPh){
      o+="<div class=\"dp-sec anim\"><div class=\"sec-chips\">";
      var secs=["ALL","Aメロ","Bメロ","サビ","ラスト"];
      for(var i=0;i<secs.length;i++){
        var act=secs[i]==="ALL"?!secF:secF===secs[i];
        o+="<div class=\"sec-chip "+(act?"on":"")+"\" data-action=\"sec\" data-val=\""+(secs[i]==="ALL"?"null":secs[i])+"\">"+secs[i]+"</div>";
      }
      o+="</div><div class=\"ph-list\">";
      for(var i=0;i<phs.length;i++){
        var p=phs[i];
        var pc=EC[p.em]||"#888";
        o+="<div class=\"ph-card\" style=\"--pc:"+pc+";background:linear-gradient(135deg,"+pc+"08,"+pc+"15)\"><div class=\"ptxt\">\u300c"+he(p.ph)+"\u300d</div><div class=\"pmeta\">"+pill(p.em)+"<span>"+he(p.sub)+"</span>"+(p.sec?"<span style=\"background:#ffffff08;padding:2px 6px;border-radius:4px;color:#6666aa\">"+he(p.sec)+"</span>":"")+"<span style=\"color:#555\">温度 "+p.tmp+"</span></div></div>";
      }
      if(!phs.length)o+="<div class=\"empty\">該当フレーズなし</div>";
      o+="</div></div>";
    }
    o+="</div></div>";
  }
  app.innerHTML=o;

  // Re-attach search input listener with IME support
  var sinp=document.getElementById("sinp");
  if(sinp){
    sinp.addEventListener("compositionstart",function(){sinp._composing=true;});
    sinp.addEventListener("compositionend",function(){sinp._composing=false;txtF=this.value;render();});
    sinp.addEventListener("input",function(){if(!sinp._composing){txtF=this.value;render();}});
    if(document.activeElement&&document.activeElement.tagName==="BODY"&&txtF){sinp.focus();sinp.setSelectionRange(txtF.length,txtF.length);}
  }

  if(sel){var d=document.getElementById("dtl");if(d)d.scrollIntoView({behavior:"smooth",block:"start"});}
}
render();


</script>
</body>
</html>
