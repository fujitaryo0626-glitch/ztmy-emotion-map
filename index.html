function reasonData(a,b){var chips=[];if(!a||!b)return{chips:chips};var aa=uniq([a.t1,a.t2,a.t3]),bb=uniq([b.t1,b.t2,b.t3]);var shared=[];for(var i=0;i<aa.length;i++){if(bb.indexOf(aa[i])>=0)shared.push(aa[i]);}if(shared.length)chips.push("共通感情: "+shared.slice(0,2).join(" / "));var fa=[a.vA,a.vB,a.ch,a.end],fb=[b.vA,b.vB,b.ch,b.end],labs=["Aメロ","Bメロ","サビ","ラスト"],same=[];for(var i=0;i<fa.length;i++){if(fa[i]&&fa[i]===fb[i])same.push(labs[i]);}if(same.length)chips.push("フロー一致: "+same.slice(0,2).join("・"));else if(a.end&&b.end&&a.end===b.end)chips.push("終盤の着地: "+a.end);var ha=getHist(a.name),hb=getHist(b.name),common=[];if(ha&&hb){for(var i=0;i<EO.length;i++){var e=EO[i],pa=(ha[e]||0)/(ha.t||1),pb=(hb[e]||0)/(hb.t||1),sc=Math.min(pa,pb);if(sc>=0.16)common.push([e,sc]);}common.sort(function(x,y){return y[1]-x[1];});if(common.length)chips.push("分布近似: "+common.slice(0,2).map(function(x){return x[0];}).join(" / "));}if(!chips.length&&a.t1&&b.t1&&a.t1===b.t1)chips.push("主感情が近い: "+a.t1);if(!chips.length&&a.t2&&[b.t1,b.t2,b.t3].indexOf(a.t2)>=0)chips.push("補助感情が近い: "+a.t2);if(!chips.length)chips.push("情感の温度感が近い");return{chips:chips.slice(0,3)};}
function renderFlowMini(s){var fl=flowList(s),o="<div class=\"cmp-flow\">";for(var i=0;i<fl.length;i++){var fc=EC[fl[i][1]]||"#888";o+="<span class=\"cmp-fb\" style=\"background:"+fc+"22;color:"+fc+";border-color:"+fc+"44\">"+he(fl[i][0])+" "+he(fl[i][1])+"</span>";}return o+"</div>";}

// Event delegation - no inline onclick needed
document.addEventListener("click",function(ev){
  var t=ev.target.closest("[data-action]");
  if(!t)return;
  var a=t.getAttribute("data-action");
  var v=t.getAttribute("data-val");
  if(a==="pick"){sel=v==="null"?null:S[parseInt(v)].name;showPh=false;secF=null;cmp=null;render();}
  else if(a==="emo"){emoF=(v==="null"||emoF===v)?null:v;render();}
  else if(a==="flow"){flowF=(v==="null"||flowF===v)?null:v;render();}
  else if(a==="favonly"){favOnly=!favOnly;render();}
  else if(a==="fav"){toggleFav(v);render();}
  else if(a==="drill"){showPh=!showPh;render();}
  else if(a==="sec"){secF=v==="null"?null:v;render();}
  else if(a==="sim"){
    for(var i=0;i<S.length;i++){if(S[i].name===v){sel=S[i].name;showPh=false;secF=null;cmp=null;render();break;}}
  }
  else if(a==="cmp"){cmp=(v==="null"||cmp===v)?null:v;if(cmp===sel)cmp=null;render();}
  else if(a==="savecmp"){if(sel&&cmp&&cmp!==sel){var aa=getSong(sel),bb=getSong(cmp);if(aa&&bb)saveCompareImage(aa,bb);}}
});

  }
  o+="</div>";
  o+="<div class=\"chips chips-sub\"><div class=\"chip "+(favOnly?"on":"")+"\" data-action=\"favonly\" data-val=\"1\">★ お気に入り</div>";

  o+="<div class=\"grid\">";
  for(var si=0;si<songs.length;si++){

        if(rr.chips&&rr.chips.length){o+="<div class=\"why-chips\" style=\"margin-bottom:10px\">";for(var ri=0;ri<rr.chips.length;ri++){o+="<span class=\"why-chip\">"+he(rr.chips[ri])+"</span>";}o+="</div>";}

render();
